name: Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true
        type: string

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Bump versions
        run: |
          npm version "${{ inputs.version }}" --no-git-tag-version --workspaces --if-present
          node scripts/sync-internal-deps.mjs "${{ inputs.version }}"
      - uses: peter-evans/create-pull-request@v7
        with:
          title: "chore: version packages v${{ inputs.version }}"
          commit-message: "chore: version packages v${{ inputs.version }}"
          branch: release/v${{ inputs.version }}
